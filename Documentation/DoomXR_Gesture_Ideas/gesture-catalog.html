<style>
:root{

:root[data-theme="light"]{

}
*{box-sizing:border-box}
body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font-sans);line-height:1.6;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 60px;}
h1{font-size:24px;font-weight:500;margin:0 0 4px;}
.sub{color:var(--text-muted);font-size:14px;margin:0 0 20px;}

button{height:38px;padding:0 14px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-primary);font-size:14px;font-family:inherit;cursor:pointer;}
button:hover{background:var(--surface-1);}
button:active{transform:scale(0.98);}
.themebtn{position:fixed;top:20px;right:20px;width:38px;padding:0;z-index:10;}
</style>

houlder-blade-scratch-style gesture.","Environmental improvised-weapon grab (picking up ANY loose prop — pipe, chair, bottle — as a temporary bash weapon) is a whole missing category, despite fitting both 90s-Doom chaos and Indiana-Jones scrappy improvisation, and despite the whip/sword grip-detection template being trivially reusable for it.","Localized/directional damage haptics are missing. Dread Pulse gives an ambient global heartbeat and Cupped-Ear Threat Cue/Divining Ears give a proactive gesture-triggered directional ping, but nothing purely REACTIVE maps 'which side of my body just got hit' to a felt haptic side-cue — a simpler, lower-risk cousin of those ideas that's conspicuously absent.","Co-op-specific gestures are almost entirely missing. Nearly the whole catalog is single-player-framed; only Shoulder Mic Key and Overhead War Cry gesture at squad play. There's no ally-revive/drag, no ammo/item hand-off-to-teammate gesture, despite Aliens-squad-tension being a named target vibe.","GravityDir-relative anchor recomputation is never addressed: the primer states body anchors derive from feet position + viewheight + facing angle (implicitly assuming normal gravity), but the project also ships wall/ceiling walking via GravityDir. Whether chest/hip/shoulder anchors even make sense upside-down or sideways is a real unaddressed hole given how much of the catalog (and the engine) leans on GravityDir elsewhere.","Weapon-to-weapon mid-air toss-and-catch swap (throw current gun up, snatch replacement off hip/back before it lands) is absent — a flashier, more kinetic alternative to the many 'reach-to-anchor-and-grip-swap' hardpoint draws, none of which involve an actual mid-air handoff.","Underhand/lob throwing motion is never distinguished from the overhand throws assumed everywhere (grenades, torch throw, boomerang sword recall) — no bank-shot/around-corner lob option, despite it being a mechanically distinct arm motion worth its own gesture read.","The catalog never resolves what happens to a currently-held two-handed weapon's off-hand foregrip when a puzzle/utility gesture (Compass Dowsing, Motion Tracker Sweep, Living Torch, Bandolier Cinch) occupies that same hand — no auto-sling/one-handed-penalty answer is proposed anywhere, leaving a structural design gap between the weapon-handling systems and the prop-holding systems."]};
let filterCat='all', filterTop=false, filterFlag=false, query='';
const catSel=document.getElementById('catSel');
const allOpt=document.createElement('option'); allOpt.value='all'; allOpt.textContent='All categories ('+DATA.items.length+')'; catSel.appendChild(allOpt);
DATA.categories.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c+' ('+DATA.catCounts[c]+')';catSel.appendChild(o);});
function badge(kind,label,icon){
  var colors={top:['var(--bg-accent)','var(--text-accent)'],net:['var(--bg-danger)','var(--text-danger)'],hands:['var(--bg-warning)','var(--text-warning)']};
  var c=colors[kind];
  return '<span style="display:inline-flex;align-items:center;gap:3px;background:'+c[0]+';color:'+c[1]+';font-size:11px;padding:2px 7px;border-radius:var(--radius);white-space:nowrap;"><i class="ti '+icon+'" style="font-size:12px;"></i>'+label+'</span>';
}
function render(){
  var cardsEl=document.getElementById('cards');
  var q=query.trim().toLowerCase();
  var f=DATA.items.filter(function(it){
    if(filterCat!=='all'&&it.cat!==filterCat)return false;
    if(filterTop&&!it.top)return false;
    if(filterFlag&&!it.netflag&&!it.handsflag)return false;
    if(q&&!(it.name.toLowerCase().indexOf(q)>-1||it.effect.toLowerCase().indexOf(q)>-1))return false;
    return true;
  });
  document.getElementById('count').textContent=f.length+' of '+DATA.items.length+' ideas';
  cardsEl.innerHTML=f.map(function(it){return ''+
    '<div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:0.85rem 1rem;">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:4px;">'+
        '<p style="font-weight:500;font-size:15px;margin:0;">'+it.name+'</p>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap;">'+
          (it.top?badge('top','top pick','ti-star'):'')+
          (it.netflag?badge('net','needs button for MP','ti-alert-triangle'):'')+
          (it.handsflag?badge('hands','needs a free hand','ti-hand-stop'):'')+
        '</div>'+
      '</div>'+
      '<p style="font-size:12px;color:var(--text-muted);margin:0 0 6px;">'+it.cat+' &middot; '+it.anchor+'</p>'+
      '<p style="font-size:13px;color:var(--text-primary);margin:0 0 6px;line-height:1.6;">'+it.effect+'</p>'+
      '<p style="font-size:12px;color:var(--text-secondary);margin:0;line-height:1.6;"><i class="ti ti-cpu" style="font-size:13px;vertical-align:-2px;margin-right:4px;"></i>'+it.native+'</p>'+
    '</div>';}).join('');
}
document.getElementById('q').addEventListener('input',function(e){query=e.target.value;render();});
catSel.addEventListener('change',function(e){filterCat=e.target.value;render();});
var topBtn=document.getElementById('topBtn'),flagBtn=document.getElementById('flagBtn');
function sync(btn,a){btn.style.background=a?'var(--bg-accent)':'';btn.style.borderColor=a?'var(--border-accent)':'';btn.style.color=a?'var(--text-accent)':'';}
topBtn.addEventListener('click',function(){filterTop=!filterTop;sync(topBtn,filterTop);render();});
flagBtn.addEventListener('click',function(){filterFlag=!filterFlag;sync(flagBtn,filterFlag);render();});
document.getElementById('gaps').innerHTML=DATA.gaps.map(function(g){return '<li style="margin-bottom:6px;">'+g+'</li>';}).join('');
var themeBtn=document.getElementById('themeBtn');
themeBtn.addEventListener('click',function(){
  var r=document.documentElement;
  var light=r.getAttribute('data-theme')==='light';
  r.setAttribute('data-theme',light?'dark':'light');
  themeBtn.innerHTML=light?'<i class="ti ti-sun"></i>':'<i class="ti ti-moon"></i>';
});
render();
</script>
</body>
</html>
